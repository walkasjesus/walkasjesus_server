---
####################
# Project settings #
####################

# App version (can be manually chosen. If a new one is set, a new directory will be created. Backup can be restored by repoint the symlink)
waj_app_version: 'version_1.0'
# When a new version is installed, the database is copied over from the current version. In some circumestances you want to force this.
waj_force_copy_database: false

# Puth this value to true if the site is running production on this group of hosts
waj_production: true
# When `waj_production` is set to false, the following list needs to be filled to whitelist the developer ip's.
# When `waj_awstats_auth_users_only` is set to 1, the following list needs to be filled to whitelist the developer ip's
waj_developer_ips: []
  # - 1.1.1.1
  # - 2.2.2.2

# Will install all requirements
waj_install_requirements: true
# Will update the current database structure
waj_update_database: true
# Will create the admin user for the django application
waj_create_admin_user: false
# Will import a static CSV file with all the Commandments and corresponding Bible References from its upstream Github repository.
waj_import_commandments: false
# Will import a static CSV file with all the Media files from its upstream Github repository.
waj_import_media: false
# Update translation files
waj_update_translation_files: false
# Auto translate all files
waj_auto_translate_files: false
# Clean Thumbnail Cache
waj_clean_thumbnail_cache: false
# Import all data (Commandments, Lessons, Law of Messiah, Maimonides, Media)
waj_import_lessons: false
waj_import_law_of_messiah: false
waj_import_law_of_messiah_drawings: false
waj_import_maimonides: false
waj_import_media_lessons: false
# Delete and reimport all data
waj_delete_import_database: false
# Force import even if data is up-to-date
waj_force_import: false

# General settings
waj_config_file: '{{ waj_project_path }}/{{ waj_project_title }}/settings.py'
waj_project_name: 'walkasjesus'
waj_project_config_name: 'walkasjesus'
waj_project_title: 'walkasjesus_website'
waj_projects_directory: '/var/www'
waj_project_path: '{{ waj_projects_directory }}/{{ waj_project_name }}/current/{{ waj_project_title }}'
waj_python_env: '{{ waj_git_project_path }}/{{ waj_project_title }}/venv'
waj_static_root: '{{ waj_git_project_path }}/{{ waj_project_title }}/staticfiles'
waj_media_files: "{{ playbook_dir }}/prerequisites/walkasjesus_media_files/media/"
waj_media_root: '{{ waj_git_project_path }}/{{ waj_project_title }}/media'
waj_media_cache_dir: '{{ waj_media_root }}/cache'
waj_extra_settings: {}
# Awstats directory
waj_awstats_dir: "{{ waj_projects_directory }}/{{ waj_project_name }}/awstats"

#Settings.py
waj_settings_debug: False

################
# Git settings #
################
# Will force a git clone, even if there is no up-to-date and clean local repository
waj_git_force: yes
# Will clone the configured origin repository to the {{ waj_git_project_path }}
waj_git_clone: yes
#What version of the repository to check out (default HEAD).  This can be the literal string `HEAD', a branch name, a tag name. 
waj_git_version: HEAD
# Will update the current git repository to the {{ waj_git_project_path }}
waj_git_update: yes
waj_git_track_submodules: yes
# Warning! ssh key can be required
waj_git_repository: 'https://github.com/walkasjesus/walkasjesus_framework.git'
waj_git_user: '{{ waj_app_user }}'
waj_git_project_path: '{{ waj_projects_directory }}/{{ waj_project_name }}/{{ waj_app_version }}/{{ waj_project_title }}'
waj_apply_local_overrides: true
waj_local_framework_source: "{{ playbook_dir }}/prerequisites/walkasjesus_framework/walkasjesus_website"

##################
# Nginx settings #
##################

waj_nginx_main_template: nginx.conf.j2
waj_nginx_app_template: app-nginx.conf.j2

waj_app_user: www-data
waj_app_group: www-data

# Define your list of domain names here
waj_domain_names:
  - "{{ walkasjesus_hostname | default(inventory_hostname) }}"
waj_csrf_trusted_origins: "{{ (waj_domain_names | map('regex_replace', '^(.*)$', 'https://\\1') | list) + (waj_domain_names | map('regex_replace', '^(.*)$', 'http://\\1') | list) }}"

# How long nginx should serve static files (By Example '1d' or 'max')
waj_nginx_cache_static_files: 1d
waj_nginx_max_fileupload_size: '40M'
waj_nginx_keepalive_timeout: 180
waj_nginx_client_body_timeout: 1200s

# Legacy statistics setup (awstats/webalizer) can be enabled explicitly.
waj_enable_awstats: false

####################
# Awstats settings #
####################
# Awstats is a user statistics tool

# Allow awstats access from web to authenticated users only. Set to `0` to disable.
waj_awstats_auth_users_only: 1

# Define the users/passwords for all users which get access to the statistics page. The following variables should be set in a Vault! 
waj_developer_users: []
  # - { user: 'username1', password: 'password1' }

##################
# uWSGI settings #
##################

waj_uwsgi_app_template: app-uwsgi.ini.j2

###################
# Redis settings  #
###################

waj_use_redis_cache: false
waj_redis_host: localhost
waj_redis_port: 6379
waj_redis_db: 1
waj_redis_password: ""

# Django cache backend environment variables
waj_django_cache_backend: "{{ 'django_redis.cache.RedisCache' if waj_use_redis_cache else 'django.core.cache.backends.filebased.FileBasedCache' }}"
waj_django_cache_location: "{{ 'redis://' + waj_redis_host + ':' + waj_redis_port|string + '/' + waj_redis_db|string if waj_use_redis_cache else '/var/cache/walkasjesus' }}"
waj_disable_cache_for_debug: False

###################
# System Packages #
###################

waj_packages:
  # Mandatory middleware
  - nginx
  - uwsgi
  - uwsgi-plugin-python3
  - build-essential
  - pkg-config
  - python3-dev
  - libmariadb-dev
  # Mandatory for the JC Application
  - python3-pip
  - python3-virtualenv
  - python3-venv
  - python3-certbot-nginx
  # Mandatory to pull latest repositories from github:
  - git
  - gettext
  - rsync

#####################
# Database settings #
#####################

### First you need to define if you want to use a database or rather a plain sqlite file:
# waj_db_type: sqlite
waj_db_type: mariadb

# Default credentials/settings for first bootstrap only. Override these in host_vars or vault.
waj_secretkey: change-me
waj_bible_api_key: ''
waj_superuser_username: admin
waj_superuser_email: admin@example.org
waj_superuser_password: change-me

# Set this to the user ansible is logging in as - should have root
# or sudo access
mysql_user_home: /root
mysql_user_name: root

# The default root user installed by mysql - almost always root
mysql_root_home: /root
mysql_root_username: root

# Set this to `true` to forcibly update the root password.
mysql_root_password_update: false
mysql_user_password_update: false

mysql_enabled_on_startup: true

# Whether my.cnf should be updated on every run.
overwrite_global_mycnf: true

# Define a custom list of packages to install; if none provided, the default
# package list from vars/[OS-family].yml will be used.
# mysql_packages:
#   - mariadb-server

# MySQL connection settings.
mysql_port: "3306"
mysql_bind_address: '0.0.0.0'
mysql_skip_name_resolve: false
mysql_datadir: /var/lib/mysql
mysql_sql_mode: ''
# The following variables have a default value depending on operating system.
# mysql_pid_file: /var/run/mysqld/mysqld.pid
# mysql_socket: /var/lib/mysql/mysql.sock

# Log file settings.
mysql_log_file_group: mysql

# Slow query log settings.
mysql_slow_query_log_enabled: false
mysql_slow_query_time: "2"
# The following variable has a default value depending on operating system.
# mysql_slow_query_log_file: /var/log/mysql-slow.log

# Memory settings (default values optimized ~512MB RAM).
mysql_key_buffer_size: "256M"
mysql_max_allowed_packet: "64M"
mysql_table_open_cache: "256"
mysql_sort_buffer_size: "1M"
mysql_read_buffer_size: "1M"
mysql_read_rnd_buffer_size: "4M"
mysql_myisam_sort_buffer_size: "64M"
mysql_thread_cache_size: "8"
mysql_query_cache_type: "0"
mysql_query_cache_size: "16M"
mysql_query_cache_limit: "1M"
mysql_max_connections: "1024"
mysql_tmp_table_size: "16M"
mysql_max_heap_table_size: "16M"
mysql_group_concat_max_len: "1024"
mysql_join_buffer_size: "262144"

# Other settings.
mysql_lower_case_table_names: "0"
mysql_wait_timeout: "28800"
mysql_event_scheduler_state: "OFF"

# InnoDB settings.
mysql_innodb_file_per_table: "1"
# Set .._buffer_pool_size up to 80% of RAM but beware of setting too high.
mysql_innodb_buffer_pool_size: "256M"
# Set .._log_file_size to 25% of buffer pool size.
mysql_innodb_log_file_size: "64M"
mysql_innodb_log_buffer_size: "8M"
mysql_innodb_flush_log_at_trx_commit: "1"
mysql_innodb_lock_wait_timeout: "50"

# These settings require MySQL > 5.5.
mysql_innodb_large_prefix: "1"
mysql_innodb_file_format: "barracuda"

# mysqldump settings.
mysql_mysqldump_max_allowed_packet: "64M"

# Logging settings.
mysql_log: ""
# The following variables have a default value depending on operating system.
# mysql_log_error: /var/log/mysql/mysql.err
# mysql_syslog_tag: mysql

mysql_config_include_files: []
#  - src: path/relative/to/playbook/file.cnf
#  - { src: path/relative/to/playbook/anotherfile.cnf, force: yes }

########################################
# Jesus Commandments Database Settings #
########################################

waj_mysql_db_name: wajdatabase
waj_mysql_db_collation: utf8_general_ci
waj_mysql_db_encoding: utf8
waj_mysql_db_state: present

waj_mysql_user_name: wajsystem
waj_mysql_user_password: change-me
waj_mysql_user_host: 127.0.0.1
waj_mysql_user_priv: "wajdatabase.*:ALL"
waj_mysql_user_state: present
waj_mysql_user_append_privs: false
waj_mysql_user_encrypted: false

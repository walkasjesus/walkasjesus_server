---
- name: Create directories
  file:
    path: '{{ item }}'
    state: directory
    owner: '{{ waj_app_user }}'
  with_items:
    - '{{ waj_projects_directory }}'
    - '{{ waj_projects_directory }}/{{ waj_project_name }}'
    - '{{ waj_awstats_dir }}'

- name: Check if current version exists
  stat: 
    path: '{{ waj_projects_directory }}/{{ waj_project_name }}/current'
  register: currentversion

- name: Create version directory
  file:
    path: '{{ waj_projects_directory }}/{{ waj_project_name }}/{{ waj_app_version }}'
    state: directory
    owner: '{{ waj_app_user }}'
  register: newversion

- name: Change recursively all permissions 
  file:
    dest: '{{ waj_projects_directory }}/{{ waj_project_name }}/{{ waj_app_version }}'
    owner: '{{ waj_app_user }}'
    group: '{{ waj_app_group }}'
    mode: u=rwX,g=rwX,o=rX
    recurse: yes

- name: Mark project path as a safe git directory
  ansible.builtin.command:
    cmd: git config --global --add safe.directory {{ waj_git_project_path }}
  changed_when: false
  when: not waj_use_local_framework_project | bool

- name: Rewrite GitHub SSH URLs to HTTPS for submodules
  ansible.builtin.command:
    cmd: git config --global url.https://github.com/.insteadOf {{ item }}
  loop:
    - 'git@github.com:'
    - 'ssh://git@github.com/'
  changed_when: false
  when: not waj_use_local_framework_project | bool

- name: Clone git repository    
  git:
    repo: '{{ waj_git_repository }}'
    dest: '{{ waj_git_project_path }}'
    clone: '{{ waj_git_clone }}'
    update: '{{ waj_git_update }}'
    force: '{{ waj_git_force }}'
    recursive: no
    track_submodules: no
    version: '{{ waj_git_version }}'
  notify:
    - reload uwsgi
  when: not waj_use_local_framework_project | bool

- name: Deploy local framework project
  synchronize:
    src: '{{ waj_local_framework_project_source }}/'
    dest: '{{ waj_git_project_path }}/'
    recursive: yes
    delete: yes
    rsync_opts:
      - '--exclude=.git'
      - '--exclude=.gitmodules'
      - '--exclude=walkasjesus_website/venv'
      - '--exclude=walkasjesus_website/media'
      - '--exclude=walkasjesus_website/log'
      - '--exclude=walkasjesus_website/staticfiles'
  when: waj_use_local_framework_project | bool
  notify:
    - reload uwsgi

- name: Rewrite repository .gitmodules SSH URLs to HTTPS
  ansible.builtin.command:
    cmd: sed -i 's|git@github.com:|https://github.com/|g' .gitmodules
    chdir: '{{ waj_git_project_path }}'
  changed_when: false
  when:
    - waj_git_track_submodules | bool
    - not waj_use_local_framework_project | bool

- name: Sync git submodule configuration
  ansible.builtin.command:
    cmd: git submodule sync --recursive
    chdir: '{{ waj_git_project_path }}'
  changed_when: false
  when:
    - waj_git_track_submodules | bool
    - not waj_use_local_framework_project | bool

- name: Update git submodules recursively
  ansible.builtin.command:
    cmd: git submodule update --init --recursive
    chdir: '{{ waj_git_project_path }}'
  when:
    - waj_git_track_submodules | bool
    - not waj_use_local_framework_project | bool

- name: Check local framework override files
  stat:
    path: "{{ waj_local_framework_source }}/{{ item.src }}"
  loop: "{{ waj_local_override_files }}"
  register: waj_local_override_stats
  when:
    - waj_apply_local_overrides | bool
    - not waj_use_local_framework_project | bool
  delegate_to: localhost
  become: false

- name: Deploy local framework override files
  copy:
    src: "{{ waj_local_framework_source }}/{{ item.item.src }}"
    dest: "{{ waj_git_project_path }}/{{ waj_project_title }}/{{ item.item.dest }}"
    owner: '{{ waj_app_user }}'
    group: '{{ waj_app_group }}'
    mode: u=rw,g=r,o=r
  loop: "{{ waj_local_override_stats.results }}"
  when:
    - waj_apply_local_overrides | bool
    - not waj_use_local_framework_project | bool
    - item.stat.exists | default(false)
  notify:
    - reload uwsgi

- name: Deploy config
  template:
    src: 'settings.py.j2'
    dest: '{{ waj_git_project_path }}/{{ waj_project_title }}/{{ waj_project_title }}/settings.py'
    owner: '{{ waj_app_user }}'
    group: '{{ waj_app_group }}'
  notify:
    - reload uwsgi

- name: Create log directory
  file:
    path: '{{ waj_git_project_path }}/{{ waj_project_title }}/log'
    state: directory
    owner: '{{ waj_app_user }}'

- name: Ensure media directories exist
  file:
    path: '{{ item }}'
    state: directory
    owner: '{{ waj_app_user }}'
    group: '{{ waj_app_group }}'
    mode: u=rwX,g=rwX,o=rX
  loop:
    - '{{ waj_media_root }}'
    - '{{ waj_media_cache_dir }}'

- name: Deploy superuser config
  template:
    src: 'import_users.py.j2'
    dest: '{{ waj_git_project_path }}/{{ waj_project_title }}/account_app/management/commands/import_users.py'
    owner: '{{ waj_app_user }}'
    group: '{{ waj_app_group }}'
  notify:
    - reload uwsgi

- name: Copy media files 
  synchronize:
    src: '{{ waj_media_files }}'
    dest: '{{ waj_media_root }}/'
    recursive: yes
  when: waj_media_files | length > 0

- name: Ensure media ownership after sync
  file:
    path: '{{ waj_media_root }}'
    owner: '{{ waj_app_user }}'
    group: '{{ waj_app_group }}'
    mode: u=rwX,g=rwX,o=rX
    recurse: yes
  when: waj_media_files | length > 0

- name: Copy previous media files 
  synchronize:
    src: '{{ waj_project_path }}/{{ waj_project_title }}/media/files'
    dest: '{{ waj_git_project_path }}/{{ waj_project_title }}/media/files'
    recursive: yes
  delegate_to: "{{ inventory_hostname }}"
  when:
    - newversion.changed
    - currentversion.stat.islnk is defined

- name: Copy database from current version to new version
  copy:
    src: '{{ waj_project_path }}/{{ waj_project_title }}/db.sqlite3'
    dest: '{{ waj_git_project_path }}/{{ waj_project_title }}/db.sqlite3'
    remote_src: yes
    owner: '{{ waj_app_user }}'
    group: '{{ waj_app_group }}'
    mode: u=rw,g=rw,o=r
  when:
    - (newversion.changed) or (waj_force_copy_database)
    - (not waj_import_commandments) or (not waj_import_media)
    - waj_db_type != "mariadb"
    - currentversion.stat.islnk is defined

- name: Check if previous Bible API cache file exists
  stat:
    path: '{{ waj_project_path }}/{{ waj_project_title }}/bible_api_cache.json'
  register: waj_previous_bible_api_cache
  when:
    - newversion.changed
    - currentversion.stat.islnk is defined

- name: Copy Bible API cache from current version to new version
  copy:
    src: '{{ waj_project_path }}/{{ waj_project_title }}/bible_api_cache.json'
    dest: '{{ waj_git_project_path }}/{{ waj_project_title }}/bible_api_cache.json'
    remote_src: yes
    owner: '{{ waj_app_user }}'
    group: '{{ waj_app_group }}'
    mode: u=rw,g=r,o=r
  when:
    - newversion.changed
    - currentversion.stat.islnk is defined
    - waj_previous_bible_api_cache.stat.exists | default(false)

- name: Install pip dependencies
  pip:
    name: uWSGI
    virtualenv: '{{ waj_python_env }}'
    virtualenv_python: python3

- name: Change recursively all permissions 
  file:
    dest: '{{ waj_projects_directory }}/{{ waj_project_name }}/{{ waj_app_version }}'
    owner: '{{ waj_app_user }}'
    group: '{{ waj_app_group }}'
    mode: u=rwX,g=rwX,o=rX
    recurse: yes

- name: Install requirements
  shell: |
    set -e
    python3 -m venv ./venv
    ./venv/bin/pip install --upgrade pip
    ./venv/bin/pip install --upgrade -r requirements.txt
  args:
    chdir: "{{ waj_git_project_path }}/{{ waj_project_title }}"
    executable: /bin/bash
  when:
    - waj_install_requirements

- name: Collect static files
  shell: |
    set -e
    ./venv/bin/python3 manage.py collectstatic --noinput
  args:
    chdir: "{{ waj_git_project_path }}/{{ waj_project_title }}"
    executable: /bin/bash

- name: Ensure collected static ownership
  file:
    path: '{{ waj_static_root }}'
    state: directory
    owner: '{{ waj_app_user }}'
    group: '{{ waj_app_group }}'
    mode: u=rwX,g=rwX,o=rX
    recurse: yes

- name: Ensure utf8mb4 on all database tables
  shell: |
    mysql -h{{ waj_mysql_user_host }} -u{{ waj_mysql_user_name }} -p{{ waj_mysql_user_password }} {{ waj_mysql_db_name }} -e "SET FOREIGN_KEY_CHECKS=0;"
    mysql -h{{ waj_mysql_user_host }} -u{{ waj_mysql_user_name }} -p{{ waj_mysql_user_password }} -Nse "SELECT CONCAT('ALTER TABLE `', table_name, '` CONVERT TO CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;') FROM information_schema.tables WHERE table_schema='{{ waj_mysql_db_name }}';" | mysql -h{{ waj_mysql_user_host }} -u{{ waj_mysql_user_name }} -p{{ waj_mysql_user_password }} {{ waj_mysql_db_name }}
    mysql -h{{ waj_mysql_user_host }} -u{{ waj_mysql_user_name }} -p{{ waj_mysql_user_password }} {{ waj_mysql_db_name }} -e "SET FOREIGN_KEY_CHECKS=1;"
  when: waj_db_type == "mariadb"

- name: Ensure utf8mb4 for reversion_version table
  shell: |
    table_exists=$(mysql -h{{ waj_mysql_user_host }} -u{{ waj_mysql_user_name }} -p{{ waj_mysql_user_password }} -Nse "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='{{ waj_mysql_db_name }}' AND table_name='reversion_version';")
    if [ "$table_exists" -eq 1 ]; then
      mysql -h{{ waj_mysql_user_host }} -u{{ waj_mysql_user_name }} -p{{ waj_mysql_user_password }} {{ waj_mysql_db_name }} -e "
        ALTER TABLE reversion_version
          MODIFY serialized_data LONGTEXT CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci NOT NULL,
          MODIFY format VARCHAR(255) CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci NOT NULL DEFAULT '';
      "
    fi
  when: waj_db_type == "mariadb"

- name: Update database
  shell: |
    set -e
    ./venv/bin/python3 manage.py migrate
    ./venv/bin/python3 manage.py createinitialrevisions
  args:
    chdir: "{{ waj_git_project_path }}/{{ waj_project_title }}"
    executable: /bin/bash
  when:
    - waj_update_database

- name: Create application admin user
  shell: |
    set -e
    ./venv/bin/python3 - <<'PY'
    import os
    os.environ.setdefault('DJANGO_SETTINGS_MODULE', 'walkasjesus_website.settings')
    import django
    django.setup()
    from django.contrib.auth import get_user_model

    User = get_user_model()
    username = os.environ['WAJ_SUPERUSER_USERNAME']
    email = os.environ['WAJ_SUPERUSER_EMAIL']
    password = os.environ['WAJ_SUPERUSER_PASSWORD']

    user, _ = User.objects.get_or_create(username=username, defaults={'email': email})
    user.email = email
    user.is_staff = True
    user.is_superuser = True
    user.set_password(password)
    user.save()
    PY
  args:
    chdir: "{{ waj_git_project_path }}/{{ waj_project_title }}"
    executable: /bin/bash
  environment:
    WAJ_SUPERUSER_USERNAME: "{{ waj_superuser_username }}"
    WAJ_SUPERUSER_EMAIL: "{{ waj_superuser_email }}"
    WAJ_SUPERUSER_PASSWORD: "{{ waj_superuser_password }}"
  no_log: true
  when:
    - waj_create_admin_user

- name: Update translation files
  shell: "bash update_translation_files.sh"
  args:
    chdir: "{{ waj_git_project_path }}/{{ waj_project_title }}"
    executable: /bin/bash
  when:
    - waj_update_translation_files
  notify: reload uwsgi

- name: Auto translate files
  shell: "bash auto_translate_files.sh"
  args:
    chdir: "{{ waj_git_project_path }}/{{ waj_project_title }}"
    executable: /bin/bash
  when:
    - waj_auto_translate_files

- name: Compile translation catalogs
  shell: |
    set -e
    ./venv/bin/python3 manage.py compilemessages
  args:
    chdir: "{{ waj_git_project_path }}/{{ waj_project_title }}"
    executable: /bin/bash
  notify: reload uwsgi

- name: Clear all non-bible caches
  shell: "bash clear_all_caches.sh"
  args:
    chdir: "{{ waj_git_project_path }}/{{ waj_project_title }}"
    executable: /bin/bash
  environment:
    DJANGO_CACHE_BACKEND: "{{ waj_django_cache_backend }}"
    DJANGO_CACHE_LOCATION: "{{ waj_django_cache_location }}"
    DISABLE_CACHE_FOR_DEBUG: "{{ waj_disable_cache_for_debug | lower }}"
  when:
    - waj_clear_all_caches
  tags:
    - waj_cache
  notify:
    - restart uwsgi
    - restart nginx

- name: Clean Thumbnail Cache
  shell: "bash clean_thumbnail_cache.sh"
  args:
    chdir: "{{ waj_git_project_path }}/{{ waj_project_title }}"
    executable: /bin/bash
  when:
    - waj_clean_thumbnail_cache
    - not waj_clear_all_caches
  tags:
    - waj_cache
  notify: restart uwsgi

- name: Clean Django Cache
  shell: "bash clear_django_cache.sh"
  args:
    chdir: "{{ waj_git_project_path }}/{{ waj_project_title }}"
    executable: /bin/bash
  environment:
    DJANGO_CACHE_BACKEND: "{{ waj_django_cache_backend }}"
    DJANGO_CACHE_LOCATION: "{{ waj_django_cache_location }}"
    DISABLE_CACHE_FOR_DEBUG: "{{ waj_disable_cache_for_debug | lower }}"
  when:
    - waj_clear_django_cache
    - not waj_clear_all_caches
  tags:
    - waj_cache
  notify:
    - restart uwsgi
    - restart nginx

- name: Point symlink to new version
  file:
    src: '{{ waj_projects_directory }}/{{ waj_project_name }}/{{ waj_app_version }}'
    dest: '{{ waj_projects_directory }}/{{ waj_project_name }}/current'
    state: link
  notify:
    - restart uwsgi
    - restart nginx
